<!-- 4. Database / Stats Section -->
<section class="database-section">
    <div class="section-header">
        <h2>Live Incident Logs</h2>
        <p>Connected to NeonDB</p>
    </div>
    
    <!-- Summary Stats -->
    <div class="stats-container">
        <div class="stat-box">
            <h3>Red Alerts</h3>
            <p id="stat-red">0</p>
        </div>
        <div class="stat-box">
            <h3>Orange Alerts</h3>
            <p id="stat-orange">0</p>
        </div>
        <div class="stat-box">
            <h3>Yellow Alerts</h3>
            <p id="stat-yellow">0</p>
        </div>
    </div>
    
    <!-- Incident Table -->
    <div class="incident-table-container">
        <table class="incident-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Code</th>
                    <th>Section</th>
                    <th>Building</th>
                    <th>Floor</th>
                </tr>
            </thead>
            <tbody id="incident-rows">
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </div>
    
    <div class="log-console" id="console-log">
        <!-- Logs will appear here -->
    </div>
</section>
